    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #002366; margin: 0; padding: 20px; text-align: center; color: white; }
        header { margin-bottom: 40px; }
        h1 { margin: 0; font-size: 3rem; color: #ff69b4; } /* Pink header */
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; margin: 0 auto; }
        
        .item { background: #003399; padding: 15px; border-radius: 20px; border: 2px solid #ff69b4; transition: 0.3s; }
        .item:hover { transform: scale(1.05); background: #0040c0; }
        
        .item img { width: 100%; border-radius: 12px; display: block; cursor: pointer; }
        .item p { font-weight: 600; margin-top: 15px; color: #ffffff; }

        .btn-container { margin-top: 50px; padding-bottom: 30px; }
        .whatsapp-btn { 
            background-color: #ff69b4; color: white; padding: 20px 40px; 
            text-decoration: none; border-radius: 50px; font-weight: 600; 
            font-size: 1.4rem; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin: 10px;
            transition: 0.3s;
        }
        .whatsapp-btn:hover { transform: scale(1.05); }
        
        .clock-btn {
            background-color: #667eea; color: white; padding: 20px 40px; 
            text-decoration: none; border-radius: 50px; font-weight: 600; 
            font-size: 1.4rem; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin: 10px;
            transition: 0.3s;
        }
        .clock-btn:hover { transform: scale(1.05); }

        footer { 
            margin-top: 60px; 
            padding-top: 30px; 
            border-top: 2px solid #ff69b4; 
            padding-bottom: 20px;
        }
        
        footer p { margin: 10px 0; font-size: 1rem; }
        
        footer a { 
            color: #ff69b4; 
            text-decoration: none; 
            font-weight: 600;
            transition: 0.3s;
        }
        
        footer a:hover { 
            color: #667eea; 
            text-decoration: underline;
        }
    </style>
</head>
