<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmy's Graphix</title>
    
    <style>
        /* General Page Settings */
        body { font-family: sans-serif; background-color: #f7f9fc; margin: 0; }
        
        /* Centered Header */
        header { text-align: center; padding: 40px 20px; background-color: white; border-bottom: 1px solid #ddd; }
        header h1 { margin: 0; color: #1A237E; }
        header p { color: #555; }

        /* The Grid Layout */
        #portfolio { padding: 40px 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Each Flyer "Card" */
        .item { background: white; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .item img { width: 100%; border-radius: 5px; display: block; }
        .item p { text-align: center; margin: 10px 0 0; color: #333; font-weight: bold; }

        /* The Contact Footer */
        footer { text-align: center; padding: 60px 20px; background-color: #1A237E; color: white; }
        .whatsapp-btn {
            background-color: #25D366; /* WhatsApp Green */
            color: white; padding: 15px 30px;
            text-decoration: none; border-radius: 30px;
            font-size: 1.2rem; font-weight: bold;
            display: inline-block; transition: 0.3s;
        }
        .whatsapp-btn:hover { background-color: #1DA851; }
    </style>
</head>
<body>

    <header>
        <h1>Emmy's Graphix</h1>
        <p>Creative Designs that Make an Impact</p>
    </header>

    <main id="portfolio">
        <div class="grid">
            <div class="item">
                <img src="flyer1.png" alt="Flyer 1">
                <p>FLYER 1</p>
            </div>
            <div class="item">
                <img src="flyer2.png" alt="Flyer 2">
                <p>FLYER 2</p>
            </div>
            </div>
    </main>

    <footer>
        <a href="https://wa.me/2341234567890" target="_blank" class="whatsapp-btn">MESSAGE ON WHATSAPP</a>
    </footer>

</body>
            </html>
