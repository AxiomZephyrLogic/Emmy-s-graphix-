<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .timezone-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
        }

        .city-name {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .digital-time {
            font-size: 3rem;
            font-weight: 700;
            color: #333;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            margin: 20px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .am-pm {
            font-size: 1rem;
            color: #666;
            font-weight: 600;
            margin-top: 10px;
        }

        .date-info {
            font-size: 0.9rem;
            color: #999;
            margin-top: 10px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            background: white;
            color: #667eea;
            border: 2px solid white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        button:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .timezone-selector {
            background: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            color: #667eea;
            font-weight: 600;
        }

        .timezone-selector:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 30px;
            }

            .digital-time {
                font-size: 2rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 50px;
            font-size: 0.9rem;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 World Digital Clock</h1>

        <div class="controls">
            <button onclick="toggleFormat()">Toggle 12/24 Hour</button>
            <select class="timezone-selector" id="customTz" onchange="addCustomTimezone()">
                <option value="">+ Add Custom Timezone</option>
                <option value="America/New_York">New York</option>
                <option value="America/Los_Angeles">Los Angeles</option>
                <option value="America/Chicago">Chicago</option>
                <option value="America/Denver">Denver</option>
                <option value="Europe/London">London</option>
                <option value="Europe/Paris">Paris</option>
                <option value="Europe/Tokyo">Tokyo</option>
                <option value="Asia/Dubai">Dubai</option>
                <option value="Asia/Bangkok">Bangkok</option>
                <option value="Australia/Sydney">Sydney</option>
                <option value="Pacific/Auckland">Auckland</option>
                <option value="America/Toronto">Toronto</option>
            </select>
        </div>

        <div class="clocks-grid" id="clocksContainer">
            <!-- Clocks will be generated here -->
        </div>

        <div class="footer">
            <p>All times update in real-time • <a href="index.html">Back to Emmy's Graphix</a></p>
        </div>
    </div>

    <script>
        // Default timezones
        const defaultTimezones = [
            { tz: 'UTC', city: 'London (UTC)' },
            { tz: 'America/New_York', city: 'New York' },
            { tz: 'America/Los_Angeles', city: 'Los Angeles' },
            { tz: 'Europe/London', city: 'London' },
            { tz: 'Asia/Tokyo', city: 'Tokyo' },
            { tz: 'Australia/Sydney', city: 'Sydney' }
        ];

        let timezones = [...defaultTimezones];
        let is24Hour = true;

        // Initialize clocks
        function initializeClocks() {
            const container = document.getElementById('clocksContainer');
            container.innerHTML = '';

            timezones.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-label">${item.city}</div>
                    <div class="digital-time" id="time-${index}">00:00:00</div>
                    <div class="am-pm" id="ampm-${index}"></div>
                    <div class="date-info" id="date-${index}"></div>
                    <button onclick="removeTimezone(${index})" style="margin-top: 15px; padding: 8px 15px; font-size: 0.8rem;">Remove</button>
                `;
                container.appendChild(card);
            });

            updateAllClocks();
            setInterval(updateAllClocks, 1000);
        }

        // Update all clocks
        function updateAllClocks() {
            timezones.forEach((item, index) => {
                updateClock(item.tz, index);
            });
        }

        // Update individual clock
        function updateClock(timezone, index) {
            const now = new Date();
            
            // Get time in specified timezone
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                hour: is24Hour ? '2-digit' : '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: !is24Hour
            });

            const parts = formatter.formatToParts(now);
            let time = '';
            let ampm = '';

            parts.forEach(part => {
                if (part.type === 'hour') time += part.value;
                if (part.type === 'literal') time += part.value;
                if (part.type === 'minute') time += part.value;
                if (part.type === 'literal') time += part.value;
                if (part.type === 'second') time += part.value;
                if (part.type === 'dayPeriod') ampm = part.value;
            });

            const dateFormatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });

            document.getElementById(`time-${index}`).textContent = time;
            document.getElementById(`ampm-${index}`).textContent = ampm;
            document.getElementById(`date-${index}`).textContent = dateFormatter.format(now);
        }

        // Toggle between 12 and 24 hour format
        function toggleFormat() {
            is24Hour = !is24Hour;
            updateAllClocks();
        }

        // Add custom timezone
        function addCustomTimezone() {
            const select = document.getElementById('customTz');
            const value = select.value;

            if (value) {
                const cityName = select.options[select.selectedIndex].text;
                
                // Check if timezone already exists
                if (!timezones.some(item => item.tz === value)) {
                    timezones.push({ tz: value, city: cityName });
                    initializeClocks();
                }

                select.value = '';
            }
        }

        // Remove timezone
        function removeTimezone(index) {
            if (timezones.length > 1) {
                timezones.splice(index, 1);
                initializeClocks();
            } else {
                alert('Keep at least one timezone!');
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeClocks);
    </script>
</body>
</html>
